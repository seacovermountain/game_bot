# config.toml (使用者配置中心)

[hunting]
# 想要挂机击杀的怪物白名单（使用者看到新怪直接在这里加中文即可）
target_monsters = [
    "毒妖", 
    "白蛇妖", 
    "尸王", 
    "鲨鱼王", 
    "金刚人", 
    "稻草人", 
    "尸霸", 
    "三头蛇王", 
    "炎魔", 
    "地火兽骑将", 
    "地火兽弓箭手", 
    "猛魔刀斧手",
    "猛魔枪卒",
    "地火兽投矛手", 
    "幽影武士", 
    "巨猿",
    "招魂使",
    "烈焰使",
    "兽骑统领",
    "兽骑统领头目",
    "兽骑兵头目",
    "教主坐骑",
    "通天教主",
    "魔眼",
    "魔眼头目",
    "魔斗士",
    "魔斗士头目",
    "猛魔统领",
]

# 核心安全体征控制线
hp_protect_line = 35


[loot]
# 💰 自动拾取物品白名单（使用者看到什么好装备，直接在这里加中文）
target_items = [
    "治疗药水",
    "招魂使配饰",
    "烈焰使配饰",
    "兽骑统领配饰",
    "祝福油"
]

[logging]
capture = true    # 每轮"检测到N个候选框"
position = false   # 坐标识别结果
map = false        # 地图识别结果
monster = false    # 怪物识别/攻击判断
item = false       # 物品识别/拾取
move = false       # 移动/寻路判断
status = true     # 每轮末尾的完整状态快照(地图/坐标/怪物/物品一起打印)